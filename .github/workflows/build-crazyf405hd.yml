yaml
name: Build CrazyF405HD

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to build'
        required: true
        default: 'CRAZYF405HD'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build target
        run: make TARGET=${{ github.event.inputs.target }}

      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.inputs.target }}_firmware
          path: obj/${{ github.event.inputs.target }}/*.hex
